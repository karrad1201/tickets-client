name: CI

on:
  pull_request:
    branches: [master]
  push:
    branches: [master, "feat/**", "fix/**"]

permissions:
  contents: read

jobs:
  test:
    name: Unit Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Run unit tests
        run: ./gradlew :composeApp:testMockDebugUnitTest --no-configuration-cache

      - name: Upload test report
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: test-report
          path: composeApp/build/reports/tests/

  build:
    name: Build APK
    runs-on: ubuntu-latest
    needs: test
    if: github.event_name == 'push'

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Build mock debug APK
        run: ./gradlew :composeApp:assembleMockDebug --no-configuration-cache

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: app-mock-debug
          path: composeApp/build/outputs/apk/mock/debug/*.apk
          retention-days: 7
