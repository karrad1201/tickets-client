name: CI

on:
  pull_request:
    branches: [master]
  push:
    branches: [master, "feat/**", "fix/**"]

permissions:
  contents: read

jobs:
  test:
    name: Unit Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Run unit tests
        run: ./gradlew :composeApp:testMockDebugUnitTest

      - name: Upload test report
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: test-report
          path: composeApp/build/reports/tests/

  build-mock:
    name: Build APK
    runs-on: ubuntu-latest
    needs: test
    if: github.event_name == 'push'

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Build mock debug APK
        run: ./gradlew :composeApp:assembleMockDebug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: app-mock-debug
          path: composeApp/build/outputs/apk/mock/debug/*.apk
          retention-days: 7

  build-release:
    name: Build & Deploy Release APK
    runs-on: ubuntu-latest
    needs: test
    if: github.event_name == 'push' && github.ref == 'refs/heads/master'

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Decode keystore
        env:
          KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
        run: |
          echo "$KEYSTORE_BASE64" | base64 -d > ${{ github.workspace }}/release.keystore

      - name: Build prod release APK
        env:
          KEYSTORE_PATH: ${{ github.workspace }}/release.keystore
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
          PROD_BASE_URL: ${{ secrets.PROD_BASE_URL }}
        run: ./gradlew :composeApp:assembleProdRelease

      - name: Upload release APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: app-prod-release
          path: composeApp/build/outputs/apk/prod/release/*.apk
          retention-days: 30

      - name: Deploy APK to server
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SERVER_SSH_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh -i ~/.ssh/deploy_key -o StrictHostKeyChecking=no \
            root@${{ secrets.SERVER_HOST }} "mkdir -p /opt/tickets/apk"
          scp -i ~/.ssh/deploy_key -o StrictHostKeyChecking=no \
            composeApp/build/outputs/apk/prod/release/*.apk \
            root@${{ secrets.SERVER_HOST }}:/opt/tickets/apk/app.apk
